<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note stats dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #14141f;
    --border: #1f1f30;
    --accent-view: #4fffb0;
    --accent-like: #ff7eb3;
    --accent-follower: #7eb3ff;
    --accent-article: #ffd97e;
    --text: #dde0f0;
    --muted: #4a4a6a;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Noto Sans JP', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding-bottom: 60px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 36px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: rgba(13,13,20,0.96);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--accent-view); letter-spacing: 0.08em; }
  .logo em { color: var(--muted); font-style: normal; }
  #last-updated { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  .kpi-strip { display: grid; grid-template-columns: repeat(4,1fr); border-bottom: 1px solid var(--border); }
  .kpi { padding: 24px 36px; border-right: 1px solid var(--border); }
  .kpi:last-child { border-right: none; }
  .kpi-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px; }
  .kpi-value { font-family: var(--font-mono); font-size: 36px; font-weight: 600; line-height: 1; }
  .kpi-value.v { color: var(--accent-view); }
  .kpi-value.l { color: var(--accent-like); }
  .kpi-value.a { color: var(--accent-article); }
  .kpi-value.f { color: var(--accent-follower); }
  .kpi-diff { margin-top: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .kpi-diff.up   { color: var(--accent-view); }
  .kpi-diff.down { color: var(--accent-like); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 28px 36px; }
  .panel:nth-child(2n) { border-right: none; }
  .panel.full { grid-column: 1/-1; border-right: none; }

  .panel-title {
    font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .panel-title::before { content:''; width:6px; height:6px; border-radius:50%; background: var(--accent-view); flex-shrink:0; }
  .panel:nth-child(2)  .panel-title::before { background: var(--accent-like); }
  .panel:nth-child(3)  .panel-title::before { background: var(--accent-follower); }
  .panel:nth-child(4)  .panel-title::before { background: var(--accent-article); }
  .panel.full          .panel-title::before { background: #b07eff; }

  .chart-wrap { position: relative; height: 300px; }
  .chart-wrap.tall { height: 380px; }

  .ranking-list { display: flex; flex-direction: column; gap: 6px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
  .ranking-list::-webkit-scrollbar { width: 3px; }
  .ranking-list::-webkit-scrollbar-thumb { background: var(--border); }

  .rank-item {
    display: grid; grid-template-columns: 26px 1fr 90px;
    align-items: center; gap: 10px;
    padding: 9px 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    transition: border-color 0.15s;
  }
  .rank-item:hover { border-color: var(--accent-like); }
  .rank-num { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-align: center; }
  .rank-num.gold   { color: #ffd97e; font-weight: 600; }
  .rank-num.silver { color: #b0b8d0; font-weight: 600; }
  .rank-num.bronze { color: #c8845a; font-weight: 600; }
  .rank-title { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-right { display: flex; align-items: center; gap: 6px; }
  .rank-bar { flex:1; height:2px; background: var(--border); border-radius:1px; overflow:hidden; }
  .rank-bar-fill { height:100%; border-radius:1px; transition: width 0.8s ease; }
  .rank-val { font-family: var(--font-mono); font-size: 10px; min-width:40px; text-align:right; }
  .view-bar { background: var(--accent-view); }
  .like-bar { background: var(--accent-like); }
  .view-val { color: var(--accent-view); }
  .like-val { color: var(--accent-like); }

  .loading { display:flex; align-items:center; justify-content:center; height:200px; font-family:var(--font-mono); font-size:11px; color:var(--muted); letter-spacing:0.1em; }

  @media (max-width:768px) {
    .kpi-strip { grid-template-columns: repeat(2,1fr); }
    .grid { grid-template-columns: 1fr; }
    .panel { border-right: none !important; }
    header, .kpi, .panel { padding-left:16px; padding-right:16px; }
  }

  /* --- 追加：分析セクション用のデザイン --- */
  .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
  .status-🔥 { background: rgba(255, 69, 0, 0.2); color: #ff4500; border: 1px solid #ff4500; }
  .status-🟢 { background: rgba(79, 255, 176, 0.2); color: var(--accent-view); border: 1px solid var(--accent-view); }
  .status-⚠️ { background: rgba(255, 217, 126, 0.2); color: var(--accent-article); border: 1px solid var(--accent-article); }
  .status-💤 { background: rgba(74, 74, 106, 0.2); color: var(--muted); border: 1px solid var(--muted); }
  .trend-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
  .trend-table th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: var(--muted); }
  .trend-table td { padding: 12px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">note<em>/</em>stats</div>
  <div id="last-updated">loading...</div>
</header>

<div class="kpi-strip">
  <div class="kpi">
    <div class="kpi-label">Total Views</div>
    <div class="kpi-value v" id="kpi-views">—</div>
    <div class="kpi-diff" id="kpi-views-diff">前日比</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Total Likes</div>
    <div class="kpi-value l" id="kpi-likes">—</div>
    <div class="kpi-diff" id="kpi-likes-diff">前日比</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Articles</div>
    <div class="kpi-value a" id="kpi-articles">—</div>
    <div class="kpi-diff">公開記事数</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Followers</div>
    <div class="kpi-value f" id="kpi-followers">—</div>
    <div class="kpi-diff">フォロワー数</div>
  </div>
</div>

<div class="grid">
  <div class="panel">
    <div class="panel-title">ビュー数（折れ線）・スキ数（棒グラフ）日次推移</div>
    <div class="chart-wrap"><canvas id="chart-daily"></canvas></div>
  </div>
  <div class="panel">
    <div class="panel-title">記事ビューランキング（上位20）</div>
    <div class="ranking-list" id="ranking-views"><div class="loading">loading...</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">フォロワー数 日次推移</div>
    <div class="chart-wrap"><canvas id="chart-followers"></canvas></div>
  </div>
  <div class="panel">
    <div class="panel-title">記事スキ数ランキング（上位20）</div>
    <div class="ranking-list" id="ranking-likes"><div class="loading">loading...</div></div>
  </div>
  <div class="panel full">
    <div class="panel-title">4象限マップ（1記事あたりビュー × スキ率）</div>
    <div class="chart-wrap tall"><canvas id="chart-quad"></canvas></div>
  </div>

  <div class="panel full">
    <div class="panel-title">トレンド分析（直近7日間の動き）</div>
    <div style="overflow-x: auto;">
      <table class="trend-table">
        <thead>
          <tr>
            <th>状態</th><th>タイトル</th><th>スコア</th><th>前日比PV</th><th>7日合計</th>
          </tr>
        </thead>
        <tbody id="trend-body">
          <tr><td colspan="5" class="loading">解析データを読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="panel full">
    <div class="panel-title">資産記事（安定して読まれているストック記事）</div>
    <div class="ranking-list" id="asset-list">
      <div class="loading">資産記事を読み込み中...</div>
    </div>
  </div>
</div>

<script>
const BASE = 'https://raw.githubusercontent.com/Goo-dev0505/note-stats-public/main/data/';

async function fetchCSV(name) {
  const res = await fetch(BASE + name + '.csv?t=' + Date.now());
  if (!res.ok) throw new Error(name + ' not found');
  const text = await res.text();
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

Chart.defaults.color = '#4a4a6a';
Chart.defaults.font.family = "'IBM Plex Mono', monospace";
Chart.defaults.font.size = 10;
const GC = '#1f1f30';

function base() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: true, labels: { boxWidth: 8, padding: 14, color: '#4a4a6a' } },
      tooltip: { backgroundColor:'#14141f', borderColor:'#1f1f30', borderWidth:1, titleColor:'#dde0f0', bodyColor:'#4a4a6a', padding:10 }
    },
    scales: { x: { grid:{ color:GC }, ticks:{ maxTicksLimit:8 } }, y: { grid:{ color:GC } } }
  };
}

function setDiff(id, val) {
  if (isNaN(val)) return;
  const el = document.getElementById(id);
  const sign = val >= 0 ? '▲' : '▼';
  el.textContent = sign + Math.abs(val).toFixed(1) + '% 前日比';
  el.className = 'kpi-diff ' + (val >= 0 ? 'up' : 'down');
}

function buildDaily(rows) {
  const r = rows.slice(-60);
  const labels = r.map(d => d['日付'] ? d['日付'].slice(5) : '');
  const views  = r.map(d => Number(d['ビュー合計']));
  const likes  = r.map(d => Number(d['スキ合計']));
  new Chart(document.getElementById('chart-daily'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { type:'bar',  label:'累計スキ',  data:likes, backgroundColor:'rgba(255,126,179,0.45)', borderColor:'rgba(255,126,179,0.8)', borderWidth:1, yAxisID:'y1', order:2 },
        { type:'line', label:'累計ビュー', data:views, borderColor:'#4fffb0', backgroundColor:'rgba(79,255,176,0.07)', borderWidth:2, pointRadius:0, fill:true, tension:0.3, yAxisID:'y', order:1 },
      ]
    },
    options: {
      ...base(),
      scales: {
        x:  { grid:{ color:GC }, ticks:{ maxTicksLimit:10 } },
        y:  { grid:{ color:GC }, position:'left',  title:{ display:true, text:'ビュー', color:'#4a4a6a' } },
        y1: { grid:{ display:false }, position:'right', title:{ display:true, text:'スキ', color:'#4a4a6a' } },
      }
    }
  });
}

function buildRanking(containerId, rows, valueKey, barClass, valClass) {
  if (!rows.length) return;
  const latest = rows.reduce((a,b) => a.date > b.date ? a : b).date;
  const sorted = rows.filter(r => r.date === latest)
                     .sort((a,b) => Number(b[valueKey]) - Number(a[valueKey]))
                     .slice(0,20);
  const max = Number(sorted[0]?.[valueKey] || 1);
  const medal = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  document.getElementById(containerId).innerHTML = sorted.map((r,i) => `
    <div class="rank-item">
      <span class="rank-num ${medal(i)}">${String(i+1).padStart(2,'0')}</span>
      <span class="rank-title" title="${r.title}">${r.title}</span>
      <div class="rank-right">
        <div class="rank-bar"><div class="rank-bar-fill ${barClass}" style="width:${(Number(r[valueKey])/max*100).toFixed(1)}%"></div></div>
        <span class="rank-val ${valClass}">${Number(r[valueKey]).toLocaleString()}</span>
      </div>
    </div>
  `).join('');
}

function buildFollowers(summary, followers) {
  const fRows = followers.filter(r => r['フォロワー数']);
  let labels, data;
  if (fRows.length > 1) {
    labels = fRows.map(r => r['日付'] ? r['日付'].slice(5) : '');
    data   = fRows.map(r => Number(r['フォロワー数']));
  } else {
    const s = summary.filter(r => r['フォロワー数']);
    labels = s.map(r => r['日付'] ? r['日付'].slice(5) : '');
    data   = s.map(r => Number(r['フォロワー数']));
  }
  new Chart(document.getElementById('chart-followers'), {
    type: 'line',
    data: { labels, datasets: [{ label:'フォロワー数', data, borderColor:'#7eb3ff', backgroundColor:'rgba(126,179,255,0.08)', borderWidth:2, pointRadius:data.length<30?4:0, pointBackgroundColor:'#7eb3ff', fill:true, tension:0.3 }] },
    options: base()
  });
}

function buildQuad(rows) {
  const data = rows.map(r => ({ x:parseFloat(r['ビュー/記事'])||0, y:parseFloat(r['スキ率(%)'])||0, label:r['日付'] }));
  const xMean = data.reduce((s,d)=>s+d.x,0)/data.length;
  const yMean = data.reduce((s,d)=>s+d.y,0)/data.length;
  new Chart(document.getElementById('chart-quad'), {
    type: 'scatter',
    data: { datasets: [{ label:'日次データ', data, backgroundColor:data.map((_,i)=>`rgba(176,126,255,${0.15+i/data.length*0.7})`), pointRadius:4, pointHoverRadius:7 }] },
    options: {
      ...base(),
      plugins: { ...base().plugins, tooltip: { ...base().plugins.tooltip, callbacks: { label: ctx=>`${ctx.raw.label}  ビュー/記事:${ctx.raw.x.toFixed(1)}  スキ率:${ctx.raw.y.toFixed(2)}%` } } },
      scales: {
        x: { grid:{color:GC}, title:{display:true, text:'1記事あたりビュー', color:'#4a4a6a'} },
        y: { grid:{color:GC}, title:{display:true, text:'スキ率(%)',          color:'#4a4a6a'} },
      }
    },
    plugins: [{
      id:'quad-lines',
      afterDraw(chart) {
        const {ctx, chartArea:{left,right,top,bottom}, scales:{x,y}} = chart;
        const cx = x.getPixelForValue(xMean), cy = y.getPixelForValue(yMean);
        ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle='#2a2a42'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(cx,top);  ctx.lineTo(cx,bottom); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(left,cy); ctx.lineTo(right,cy);  ctx.stroke();
        ctx.restore();
      }
    }]
  });
}

// 新機能：トレンド表と資産記事の描画関数
function buildTrendTable(rows) {
  const tbody = document.getElementById('trend-body');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = rows.slice(0, 10).map(r => {
    const statusEmoji = r['状態'] ? r['状態'].split(' ')[0] : '💤'; 
    return `
      <tr>
        <td><span class="status-badge status-${statusEmoji}">${r['状態'] || '💤 停止'}</span></td>
        <td class="rank-title">${r['title'] || '---'}</td>
        <td class="view-val">${r['トレンドスコア'] || '0'}</td>
        <td class="view-val">+${Number(r['前日比PV'] || 0).toLocaleString()}</td>
        <td>${Number(r['7日合計PV'] || 0).toLocaleString()}</td>
      </tr>
    `;
  }).join('');
}

function buildAssetList(rows) {
  const container = document.getElementById('asset-list');
  if (!rows || rows.length === 0) {
    container.innerHTML = '<div class="loading">資産記事データがありません</div>';
    return;
  }
  container.innerHTML = rows.slice(0, 10).map((r, i) => `
    <div class="rank-item">
      <span class="rank-num">${i+1}</span>
      <span class="rank-title">${r.title || '---'}</span>
      <div class="rank-right">
        <span class="view-val">+${Number(r['期間増加PV'] || 0).toLocaleString()} PV</span>
      </div>
    </div>
  `).join('');
}

async function init() {
  try {
    const [summary, articles, followers, trend, assets] = await Promise.all([
      fetchCSV('daily_summary'), 
      fetchCSV('articles'), 
      fetchCSV('followers'),
      fetchCSV('trend_analysis'),
      fetchCSV('asset_articles')
    ]);

    const latest = summary[summary.length-1];
    document.getElementById('kpi-views').textContent     = Number(latest['ビュー合計']).toLocaleString();
    document.getElementById('kpi-likes').textContent     = Number(latest['スキ合計']).toLocaleString();
    document.getElementById('kpi-articles').textContent  = Number(latest['記事数']).toLocaleString();
    document.getElementById('kpi-followers').textContent = latest['フォロワー数'] ? Number(latest['フォロワー数']).toLocaleString() : '—';
    document.getElementById('last-updated').textContent  = 'updated ' + latest['日付'] + ' ' + (latest['更新時刻']||'');
    
    setDiff('kpi-views-diff', parseFloat(latest['ビュー前日比(%)']));
    setDiff('kpi-likes-diff', parseFloat(latest['スキ前日比(%)']));
    
    // 各パーツの描画実行
    buildDaily(summary);
    buildRanking('ranking-views', articles, 'read_count', 'view-bar', 'view-val');
    buildFollowers(summary, followers);
    buildRanking('ranking-likes', articles, 'like_count', 'like-bar', 'like-val');
    buildQuad(summary);
    buildTrendTable(trend);
    buildAssetList(assets);

  } catch(e) {
    console.error(e);
    document.getElementById('last-updated').textContent = 'エラー: ' + e.message;
  }
}

init();
</script>
</body>
</html>
